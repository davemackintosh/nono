name: Deploy

# Build the site with nono and ship the finished HTML to Vercel. The build runs
# here, not on Vercel: Vercel never sees Rust, it only serves the static output.
#
# Set three repository secrets first (Settings -> Secrets -> Actions):
#   VERCEL_TOKEN        a token from https://vercel.com/account/tokens
#   VERCEL_ORG_ID       \  run `vercel link` once locally, then read both out of
#   VERCEL_PROJECT_ID   /  the .vercel/project.json it writes.

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Grab the prebuilt Linux binary from nono's latest release: no Rust
      # toolchain, no compile, just download and run. To pin a version, swap
      # `latest/download` for `download/v0.1.0` (or whichever tag you trust).
      - name: Install nono
        run: |
          curl -fsSL \
            https://github.com/davemackintosh/nono/releases/latest/download/nono-x86_64-unknown-linux-gnu \
            -o /usr/local/bin/nono
          chmod +x /usr/local/bin/nono

      - name: Build the site
        run: nono build . --out out

      # Wrap the output in Vercel's Build Output API v3, so the next step can
      # deploy it prebuilt instead of Vercel trying (and failing) to build it.
      - name: Shape for Vercel
        run: |
          mkdir -p .vercel/output
          cp -r out .vercel/output/static
          echo '{ "version": 3 }' > .vercel/output/config.json

      - name: Deploy
        run: |
          npm install --global vercel
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
