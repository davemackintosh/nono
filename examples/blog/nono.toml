# Project configuration.

[build]
# Compile Tailwind to static/styles.css before each build (including every
# `nono dev` reload). Run `npm install` once first so the CLI is available.
# Two path tokens are substituted: <rootDir> (project root) and <publicDir>
# (the static/ directory, whose contents become the site root).
steps = ["npx @tailwindcss/cli -i assets/app.css -o <publicDir>/styles.css --minify"]
